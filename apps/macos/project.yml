name: Hallowed
options:
  bundleIdPrefix: com.hallowed
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15"
  generateEmptyDirectories: true
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release

packages:
  supabase-swift:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

targets:
  Hallowed:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Hallowed
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hallowed.macos
        PRODUCT_NAME: Hallowed
        SWIFT_VERSION: 5.9
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: Hallowed/Config/Info.plist
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"
        ENABLE_HARDENED_RUNTIME: YES
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          xcconfig: Secrets.xcconfig
          DEBUG_INFORMATION_FORMAT: dwarf
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          xcconfig: Secrets.xcconfig
          SWIFT_OPTIMIZATION_LEVEL: "-O"
    entitlements:
      path: Hallowed/Resources/Hallowed.entitlements
    dependencies:
      - package: supabase-swift
        product: Supabase
